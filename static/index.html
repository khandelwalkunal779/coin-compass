<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Compass API</title>
    <style>
      :root {
        --ink-black: #111827ff;
        --charcoal-blue: #334155ff;
        --ocean-mist: #14b8a6ff;
        --amber-gold: #fbbf24ff;
        --bright-snow: #f9fafbff;
      }
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: var(--ink-black);
        font-family: monospace;
        color: var(--charcoal-blue);
      }
      .status {
        text-align: center;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        background: var(--ocean-mist);
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      h1 {
        font-size: 1.4rem;
        color: var(--bright-snow);
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        font-size: 0.85rem;
        color: var(--amber-gold);
      }
    </style>
  </head>
  <body>
    <div class="status">
      <h1><span class="dot"></span>Coin Compass API</h1>
      <p>Server is running.</p>
    </div>
  </body>
</html>
